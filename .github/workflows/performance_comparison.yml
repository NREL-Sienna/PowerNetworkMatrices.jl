name: 'Performance Comparison'

on:
  pull_request:

jobs:
  comparison:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@latest
      - uses: actions/checkout@v1
      - name: Run Performance Test Main
        run: |
          julia --project=test -e 'using Pkg; Pkg.add(PackageSpec(name="PowerNetworkMatrices", rev="main")); Pkg.instantiate()'
          julia --project=test test/performance/performance_test.jl "Main"
      - name: Run Performance Test Branch
        run: |
          julia --project=test -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
          julia --project=test test/performance/performance_test.jl "Branch"
      - name: Format results
        run: |
          julia test/performance/format_results.jl \
            execute_time_Main.csv \
            execute_time_Branch.csv \
            precompile_time_Main.txt \
            precompile_time_Branch.txt \
            performance_results.md
      - name: Read results
        id: results
        run: |
          body="$(cat performance_results.md)"
          body="${body//'%'/'%25'}"
          body="${body//$'\n'/'%0A'}"
          body="${body//$'\r'/'%0D'}"
          echo "::set-output name=body::$body"
      - name: Find Comment
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Performance Results
      - name: Create comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.results.outputs.body }}
      - name: Update comment
        if: steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          body: ${{ steps.results.outputs.body }}
          edit-mode: replace
